name: Docker 이미지 빌드 & Docker Hub 업로드

on:
  push:
    branches: [ "main" ]
    paths:
      - 'project_design/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 소스코드 다운로드
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 & 업로드
        uses: docker/build-push-action@v5
        with:
          context: ./project_design
          dockerfile: ./project_design/Dockerfile
          push: true
          tags: |
            sweatmoon/gantt-app:latest
            sweatmoon/gantt-app:${{ github.sha }}

      - name: 완료 메시지
        run: echo "✅ 이미지 업로드 완료 - sweatmoon/gantt-app:latest"
