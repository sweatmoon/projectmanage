[pytest]
asyncio_mode = auto
testpaths = tests/unit tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = WARNING
markers =
    unit: 단위 테스트 (서비스 레이어)
    integration: 통합 테스트 (API 엔드포인트)
    functional: 기능 테스트 (스테이징 서버 E2E, 별도 실행: python test_functional_staging.py)
addopts = -v --tb=short
