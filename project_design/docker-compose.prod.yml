# ============================================================
# docker-compose.prod.yml  ← 운영 환경 오버라이드
# ============================================================
# NAS Container Manager 에서 이 파일 내용을 docker-compose.yml 에
# 이어 붙여서 사용하거나, 아래 명령으로 실행:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 환경변수는 .env 파일로 관리 (절대 Git에 커밋하지 마세요!)
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# ⚠️  포트 설정 안내
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Synology DSM > Application Portal 에서 역방향 프록시를 설정하면
# 외부 HTTPS 포트(예: 8443) → 내부 HTTP:8080 으로 전달됩니다.
#
# [권장 구성]
#   ① DSM Application Portal 역방향 프록시:
#      - 원본: HTTPS, activo-no1.synology.me, 포트 8443
#      - 대상: HTTP, localhost, 포트 8080  ← 컨테이너 내부 포트
#      - "WebSocket 활성화" 체크
#
#   ② 이 파일의 포트 매핑: "8080:8080" (역방향 프록시가 직접 접근)
#      또는 "8888:8080" 후 DSM에서 8888→8080 역방향 프록시 설정
#
#   ③ .env 파일:
#      OIDC_REDIRECT_URI=https://activo-no1.synology.me:8443/auth/callback
#      APP_URL=https://activo-no1.synology.me:8443
# ============================================================

version: '3.9'

services:

  app:
    # 운영: 항상 최신 이미지 pull
    pull_policy: always
    ports:
      # NAS DSM 역방향 프록시 사용 시: 8080:8080 (프록시가 직접 로컬 8080 접근)
      # NAS에서 직접 포트 개방 시: 8443:8080 (HTTPS 종료는 NAS 방화벽/SSL 처리)
      - "${APP_HOST_PORT:-8080}:8080"

  # ── Watchtower: 자동 이미지 업데이트 (운영 전용) ──────────
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300   # 5분마다 체크
      - WATCHTOWER_CLEANUP=true        # 구 이미지 자동 삭제
      - WATCHTOWER_NOTIFICATIONS=email # 이메일 알림 (선택)
      - WATCHTOWER_NOTIFICATION_EMAIL_FROM=${NOTIFY_EMAIL_FROM:-}
      - WATCHTOWER_NOTIFICATION_EMAIL_TO=${NOTIFY_EMAIL_TO:-}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER=${NOTIFY_SMTP_HOST:-}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT=${NOTIFY_SMTP_PORT:-587}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER=${NOTIFY_SMTP_USER:-}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD=${NOTIFY_SMTP_PASS:-}
      - TZ=Asia/Seoul
    command: gantt-app   # 이 컨테이너만 모니터링
