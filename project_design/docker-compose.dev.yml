# ============================================================
# docker-compose.dev.yml  ← 로컬 개발 환경 오버라이드
# ============================================================
# 사용법:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   또는 Makefile: make dev-docker
#
# 차이점 vs 운영:
#  - 이미지 빌드를 로컬 소스코드로 직접 수행 (Docker Hub 미사용)
#  - DB 포트 외부 노출 (로컬 DB 툴 접속용)
#  - OIDC 비활성화 → dev-login 자동 사용
#  - 소스코드 볼륨 마운트로 핫리로드
# ============================================================

version: '3.9'

services:

  app:
    # 운영 이미지 대신 로컬 소스코드를 직접 빌드
    build:
      context: .
      dockerfile: Dockerfile
    image: gantt-app:dev     # 로컬 태그 (Docker Hub push 안 함)
    pull_policy: never        # 로컬 빌드만 사용
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      # OIDC 미설정 → dev-login 자동 활성화
      - OIDC_ISSUER_URL=
      - OIDC_CLIENT_ID=
      - OIDC_CLIENT_SECRET=
      - OIDC_REDIRECT_URI=
      - APP_URL=http://localhost:8080
      - ADMIN_USERS=${ADMIN_USERS:-dev_admin}

  db:
    # 개발 시 DB 포트 외부 노출 → DBeaver, pgAdmin 등으로 직접 접속 가능
    ports:
      - "5432:5432"

  # 개발 환경에서는 Watchtower 불필요 → 제거
  watchtower:
    profiles: ["disabled"]   # 이 서비스를 비활성화
