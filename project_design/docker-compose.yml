# ============================================================
# docker-compose.yml  ← 공통 베이스 (Base)
# ============================================================
# 사용법:
#   운영: docker compose up -d
#         (자동으로 docker-compose.prod.yml 을 오버라이드로 사용)
#   개발: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# ⚠️  이 파일 단독으로는 실행하지 마세요.
#      환경별 오버라이드 파일과 함께 사용합니다.
# ============================================================

version: '3.9'

services:

  # ── 메인 앱 ──────────────────────────────────────────────
  app:
    image: sweatmoon/gantt-app:${IMAGE_TAG:-latest}
    container_name: gantt-app
    restart: unless-stopped
    networks:
      - gantt-net
    volumes:
      - app_logs:/app/logs
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql+asyncpg://gantt:${POSTGRES_PASSWORD}@db:5432/ganttdb
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-8}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-}
      - APP_URL=${APP_URL}
      - ADMIN_USERS=${ADMIN_USERS:-}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── PostgreSQL DB ────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: gantt-db
    restart: unless-stopped
    networks:
      - gantt-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=ganttdb
      - POSTGRES_USER=gantt
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=Asia/Seoul
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gantt -d ganttdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 자동 DB 백업 ─────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: gantt-backup
    restart: unless-stopped
    networks:
      - gantt-net
    volumes:
      - backup_data:/backups
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - BACKUP_KEEP_DAYS=${BACKUP_KEEP_DAYS:-30}
      - TZ=Asia/Seoul
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c",
      "echo '[시작] db 준비 대기 중...';
       until pg_isready -h db -U gantt -q; do
         echo '[대기] db 아직 준비 안 됨, 5초 후 재시도...';
         sleep 5;
       done;
       echo '[완료] db 연결 확인 - 백업 스케줄러 시작 (6시간 주기)';
       while true; do
         pg_dump -h db -U gantt -d ganttdb | gzip > /backups/backup_$(date +%Y%m%d_%H%M%S).sql.gz
         && echo \"[$(date)] ✅ 백업 완료\"
         || echo \"[$(date)] ❌ 백업 실패\";
         find /backups -name '*.sql.gz' -mtime +${BACKUP_KEEP_DAYS:-30} -delete;
         sleep 21600;
       done"]

networks:
  gantt-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  backup_data:
    driver: local
  app_logs:
    driver: local
