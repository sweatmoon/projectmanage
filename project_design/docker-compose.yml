version: '3.9'

services:
  # ── 메인 앱 ──────────────────────────────────────────────
  app:
    image: sweatmoon/gantt-app:latest
    container_name: gantt-app
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - app_logs:/app/logs
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql+asyncpg://gantt:${POSTGRES_PASSWORD:-ganttpass}@db:5432/ganttdb
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-long-random-string-at-least-32-chars}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-8}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-}
      - APP_URL=${APP_URL:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── PostgreSQL DB ────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: gantt-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=ganttdb
      - POSTGRES_USER=gantt
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ganttpass}
      - TZ=Asia/Seoul
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gantt -d ganttdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 자동 백업 ────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: gantt-backup
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data:ro
      - backup_data:/backups
    environment:
      - POSTGRES_DB=ganttdb
      - POSTGRES_USER=gantt
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ganttpass}
      - PGPASSWORD=${POSTGRES_PASSWORD:-ganttpass}
      - TZ=Asia/Seoul
      - BACKUP_KEEP_DAYS=${BACKUP_KEEP_DAYS:-30}
    depends_on:
      db:
        condition: service_healthy
    entrypoint: |
      sh -c '
        echo "백업 서비스 시작 (매일 새벽 2시 실행)"
        while true; do
          BACKUP_FILE="/backups/ganttdb_$$(date +%Y%m%d_%H%M%S).sql.gz"
          echo "[$(date)] DB 백업 시작: $$BACKUP_FILE"
          pg_dump -h db -U gantt -d ganttdb | gzip > $$BACKUP_FILE
          if [ $$? -eq 0 ]; then
            echo "[$(date)] 백업 완료: $$BACKUP_FILE"
          else
            echo "[$(date)] 백업 실패!"
          fi
          # 오래된 백업 삭제 (기본 30일 보관)
          find /backups -name "ganttdb_*.sql.gz" -mtime +${BACKUP_KEEP_DAYS:-30} -delete
          echo "[$(date)] 다음 백업까지 24시간 대기..."
          sleep 86400
        done
      '

  # ── 자동 이미지 업데이트 ─────────────────────────────────
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - TZ=Asia/Seoul
    command: gantt-app

volumes:
  postgres_data:
    driver: local
  backup_data:
    driver: local
  app_logs:
    driver: local
