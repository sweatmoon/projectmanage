version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gantt-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # SQLite DB 영구 저장
      - gantt_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/app.db
      - PORT=8080
      # JWT 설정 (필수: 실제 값으로 변경)
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-long-random-string-at-least-32-chars}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-8}
      # 시놀로지 NAS OIDC 설정 (설정 시 로그인 필요, 미설정 시 인증 스킵)
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-}
      - APP_URL=${APP_URL:-http://localhost:8080}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gantt_data:
    driver: local
